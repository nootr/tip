name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tip-x86_64-unknown-linux-gnu.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tip-aarch64-apple-darwin.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tip-x86_64-apple-darwin.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build binaries
        run: cargo build --release --target ${{ matrix.target }} -p tip-cli -p tip-node

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/package
          cp "target/${{ matrix.target }}/release/tip" dist/package/tip
          cp "target/${{ matrix.target }}/release/tip-node" dist/package/tip-node
          cp README.md LICENSE SPEC.md tip-node.example.toml trust-policy.example.toml dist/package/
          tar -C dist/package -czf "dist/${{ matrix.archive }}" .
          (cd dist && shasum -a 256 "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256")

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: |
            dist/${{ matrix.archive }}
            dist/${{ matrix.archive }}.sha256
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ matrix.archive }}
            dist/${{ matrix.archive }}.sha256
          generate_release_notes: true
