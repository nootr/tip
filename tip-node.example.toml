[node]
bind = "127.0.0.1:8080"
db = "tip-node.sqlite3"
key = "tip-node-key.json"
name = "Local TIP Node"
description = "A TIP node for local/community trust evidence"
website = "https://example.com"
contact = "mailto:admin@example.com"

[sync]
on_start = false
limit = 500
from_beginning = false
# Optional periodic peer sync for long-running nodes.
# periodic_seconds = 300
# Optional periodic full resync as a cache-refresh safety valve.
# full_resync_seconds = 86400

[[peers.nodes]]
url = "http://127.0.0.1:8081"
expected_node_public_key = "replace-with-peer-node-public-key"
name = "Local peer A"

[[peers.nodes]]
url = "http://127.0.0.1:8082"
expected_node_public_key = "replace-with-peer-node-public-key"
name = "Local peer B"
